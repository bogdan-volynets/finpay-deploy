apiVersion: argoproj.io/v1alpha1  # was: apps/v1                                                                                                                                                               
kind: Rollout                      # was: Deployment                                                                                                                                                           
metadata:                                                                                                                                                                                                      
  name: {{ .Release.Name }}                                                                                                                                                                                    
  labels:                                                                                                                                                                                                      
    app: {{ .Release.Name }}                                                                                                                                                                                   
    app.kubernetes.io/name: {{ .Chart.Name }}                                                                                                                                                                  
    app.kubernetes.io/version: {{ .Chart.AppVersion | quote }}                                                                                                                                                 
spec:                                                     
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}                                                                                                                                                                         
  {{- end }}
  strategy:                                                                                                                                                                                                    
    canary:                                               
      steps:
        {{- toYaml .Values.rollout.canary.steps | nindent 8 }}
  selector:                                                                                                                                                                                                    
    matchLabels:
      app: {{ .Release.Name }}                                                                                                                                                                                 
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}
        app.kubernetes.io/name: {{ .Chart.Name }}
    spec:
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          env:
            {{- range $key, $value := .Values.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
